# fly.toml app configuration file generated for bigdata-private-credit-stress on 2026-04-14T17:25:34-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bigdata-private-credit-stress'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Single machine: no auto-stop churn; keep one VM warm (matches scale count 1).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

# Single machine, 1024 MiB RAM (run `fly scale count 1` if the app was ever scaled up).
[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
